<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}我的博客{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ static_v('css/style.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-left">
        <a href="/blog" class="site-title">Tschin Futschi</a>
      </div>
      <nav class="header-right">
        <a href="/admin" class="nav-admin-btn">⚙️ 后台</a>
        <div class="search-wrap">
          <input type="text" id="search-input" placeholder="搜索文章…" autocomplete="off" />
          <div id="search-results"></div>
        </div>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="菜单" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
    <nav class="mobile-menu__nav">
      <a href="/blog" class="mobile-menu__link">🏠 首页</a>
      <a href="/blog/posts" class="mobile-menu__link">📄 全部文章</a>
      <a href="/blog/category/ai" class="mobile-menu__link">🤖 人工智能</a>
      <a href="/blog/category/finance" class="mobile-menu__link">💰 金融</a>
      <a href="/blog/category/sports" class="mobile-menu__link">⚽ 体育</a>
      <a href="/blog/category/hr" class="mobile-menu__link">👥 人力资源</a>
      <a href="/admin" class="mobile-menu__link mobile-menu__link--admin">⚙️ 后台管理</a>
    </nav>
    <div class="mobile-menu__search">
      <input type="text" id="mobile-search-input" placeholder="搜索文章…" autocomplete="off" />
    </div>
  </div>
  <div class="mobile-menu-overlay" id="mobile-menu-overlay"></div>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© {{ now.year }} Tschin Futschi · Driven by Claude Code.</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/header-scroll.js') }}"></script>
  <script src="{{ url_for('static', filename='js/search.js') }}"></script>

  {% if config.DEBUG %}
  <script>
    // CSS 热更新（仅 debug 模式）
    (function() {
      const link = document.querySelector('link[rel="stylesheet"]');
      if (!link) return;
      let lastModified = null;
      setInterval(function() {
        fetch(link.href, { method: 'HEAD', cache: 'no-store' })
          .then(function(r) {
            const lm = r.headers.get('Last-Modified');
            if (lastModified && lm !== lastModified) {
              const url = new URL(link.href);
              url.searchParams.set('_t', Date.now());
              link.href = url.toString();
            }
            lastModified = lm;
          })
          .catch(function() {});
      }, 1000);
    })();
  </script>
  {% endif %}
</body>
</html>
